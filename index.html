
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI File Chatbot</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#6a11cb,#2575fc);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:450px;
            background:white;
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#2575fc;
            margin-bottom:20px;
        }

        .upload-box{
            border:2px dashed #2575fc;
            padding:20px;
            border-radius:15px;
            text-align:center;
            margin-bottom:20px;
            background:#f5f9ff;
        }

        input[type="file"]{
            margin-bottom:15px;
        }

        input[type="text"]{
            width:100%;
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
            margin-top:10px;
            margin-bottom:15px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:linear-gradient(90deg,#6a11cb,#2575fc);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        button:hover{
            transform:scale(1.03);
        }

        #chatBox{
            margin-top:20px;
            background:#f3f7ff;
            padding:15px;
            border-radius:15px;
            min-height:100px;
            overflow:auto;
            color:#333;
            font-size:15px;
            line-height:1.5;
        }

        .ai-title{
            color:#6a11cb;
            font-weight:bold;
            margin-bottom:10px;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>🤖 AI File Chatbot</h1>

    <div class="upload-box">

        <input type="file" id="fileInput">

        <button onclick="uploadFile()">
            Upload File
        </button>

    </div>

    <input
            type="text"
            id="question"
            placeholder="Ask anything from uploaded file...">

    <button onclick="askAI()">
        Ask AI
    </button>

    <div id="chatBox">
        <div class="ai-title">AI Response:</div>
        Waiting for your question...
    </div>

</div>

<script>

    let uploadedFileId = "";

    function uploadFile(){

        let file = document.getElementById("fileInput").files[0];

        let formData = new FormData();

        formData.append("file", file);

        fetch("http://localhost:8080/api/upload",{

            method:"POST",
            body:formData

        })
        .then(res => res.json())
        .then(data => {

            uploadedFileId = data.fileId;

            document.getElementById("chatBox").innerHTML =
            "<div class='ai-title'>✅ File Uploaded Successfully</div>" + uploadedFileId;

        });
    }

    function askAI(){

        let question =
            document.getElementById("question").value;

        document.getElementById("chatBox").innerHTML =
        "<div class='ai-title'>⏳ AI is thinking...</div>";

        fetch("http://localhost:8080/api/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                fileId:uploadedFileId,
                question:question

            })

        })
        .then(res => res.json())
        .then(data => {

            document.getElementById("chatBox").innerHTML =
            "<div class='ai-title'>🤖 AI Response:</div>" + data.answer;

        });
    }

</script>

</body>
</html>
